name: gestbouti
description: "Gest-Boutique - Application de gestion professionnelle"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  fl_chart: ^0.69.2
  intl: ^0.20.2
  path_provider: ^2.1.5
  sembast: ^3.8.0+1
  sembast_web: ^2.4.0+2
  share_plus: ^13.1.0
  printing: ^5.15.0
  pdf: ^3.13.0
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.12
  connectivity_plus: ^6.1.4
  crypto: ^3.0.6
  http: ^1.2.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/bt.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
